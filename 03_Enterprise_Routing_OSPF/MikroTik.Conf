/ip address/add address=10.0.255.26/30 network=10.0.255.24  int =ether1
/ip pool/ add name =local-pool range = 192.168.0.1-192.168.0.254
/ip dhcp-server / add name=dhcp1 interface=ether2 lease-time=1w3d address-pool=local-pool
/ip dhcp network / add address= 192.168.0.0/24 gateway=192.168.0.1 netmask=24 dns-server=8.8.8.8 domain=lab.com
