Config DHCP and IP assign on IT dept server

en
conf t
int e0/0
ip add 10.0.3.10 255.255.255.0
no shut
des DHCP_SVR
exit
do ping 10.0.3.3
do ping 10.0.3.1
do ping 10.0.3.2
default gateway 10.0.3.3
 ip dhcp excluded-address 10.0.0.1 10.0.0.10
  ip dhcp excluded-address 10.0.1.1 10.0.0.10
   ip dhcp excluded-address 10.0.2.1 10.0.0.10
ip dhcp pool engineering
 network 10.0.0.0 255.255.255.0
 default-router 10.0.3.10 
 dns-server 8.8.8.8 4.4.2.2 
 domain-name lab.com
ip dhcp pool Sales
 network 10.0.1.0 255.255.255.0
 default-router 10.0.3.10 
 dns-server 8.8.8.8 4.4.2.2 
 domain-name lab.com
 ip dhcp pool Marketing
 network 10.0.2.0 255.255.255.0
 default-router 10.0.3.10 
 dns-server 8.8.8.8 4.4.2.2 
 domain-name lab.com
 IT-DHCPSVR(config)#ip route 0.0.0.0 0.0.0.0 10.0.3.3 name Default_Outside

